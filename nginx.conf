# EnsinoLibre core — static serve config (mirrors netlify.toml).
server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;

  # Same header the Netlify config sets.
  add_header X-Content-Type-Options nosniff always;

  # Root redirects to the landing/generator page (netlify.toml redirect).
  location = / {
    return 302 /site/index.html;
  }

  location / {
    try_files $uri $uri/ =404;
  }
}
